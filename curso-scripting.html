<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprende CES - Carley Interactive Studio</title>
    <link rel="stylesheet" href="estilos.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="icon" type="image/png" href="carley_foto_web/Logo_C.png">
    <style>
        :root {
            --primary: #7ED957;
            --secondary: #00AAFF;
            --bg-dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            overflow-x: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }

        .course-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 120px 20px 150px;
            min-height: 100vh;
            position: relative;
        }

        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 70px;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(15px);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 30px;
            border-bottom: 1px solid var(--glass-border);
        }

        .progress-wrapper {
            flex: 1;
            height: 14px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin: 0 25px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        #main-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), #a8e063);
            box-shadow: 0 0 15px var(--primary);
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #map-view {
            position: relative;
            width: 100%;
            transition: opacity 0.5s ease;
        }

        #character {
            width: 60px;
            height: 70px;
            position: absolute;
            z-index: 50;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }

        .char-body {
            width: 50px;
            height: 50px;
            background: var(--primary);
            border-radius: 15px;
            box-shadow: 0 0 25px var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            border: 2px solid rgba(255,255,255,0.3);
            animation: char-float 2s ease-in-out infinite;
        }

        @keyframes char-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .char-eye {
            width: 8px;
            height: 8px;
            background: #000;
            border-radius: 50%;
        }

        .char-feet {
            display: flex;
            gap: 15px;
            margin-top: -5px;
        }

        .char-foot {
            width: 12px;
            height: 8px;
            background: #333;
            border-radius: 4px;
        }

        .char-talking .char-body {
            animation: talk-wiggle 0.2s infinite;
        }

        @keyframes talk-wiggle {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        #stage-detail-view, #lesson-view {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .code-block {
            background: #000;
            padding: 25px;
            border-radius: 15px;
            font-family: 'Consolas', 'Monaco', monospace;
            color: #7ED957;
            border: 1px solid #222;
            line-height: 1.5;
            margin: 20px 0;
            position: relative;
            overflow-x: auto;
        }

        .practice-card {
            background: rgba(255,255,255,0.02);
            border: 1px dashed var(--glass-border);
            border-radius: 25px;
            padding: 35px;
            margin-top: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .code-input {
            width: 100%;
            background: #050505;
            border: 2px solid #222;
            border-radius: 12px;
            padding: 18px;
            color: #fff;
            font-family: monospace;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        .code-input:focus {
            border-color: var(--primary);
            background: #0a0a0a;
            box-shadow: 0 0 15px rgba(126, 217, 87, 0.2);
        }

        .btn-main {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 15px 35px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-main:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 20px rgba(126, 217, 87, 0.3);
        }

        .btn-main.outline {
            background: rgba(255,255,255,0.05);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .course-modal {
            background: #111;
            border: 1px solid #333;
            border-radius: 30px;
            padding: 40px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            position: relative;
            z-index: 2001;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hidden { display: none !important; }

        .stage-node {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 5px solid;
            background: rgba(255,255,255,0.03);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
        }

        .stage-node:hover:not(.locked) {
            transform: scale(1.1);
        }

        .stage-node.locked {
            filter: grayscale(1) opacity(0.3);
            cursor: not-allowed;
        }

        .stage-label {
            position: absolute;
            top: 110%;
            background: rgba(0,0,0,0.8);
            padding: 5px 15px;
            border-radius: 20px;
            white-space: nowrap;
            font-weight: 800;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #courses-grid .stage-node {
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            width: 100px;
            height: 100px;
            position: relative;
        }

        #courses-grid .stage-node:hover {
            border-color: var(--primary);
            background: rgba(126, 217, 87, 0.05);
        }

        .bounce { animation: bounce 0.6s ease; }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }

        .shake { animation: shake 0.5s ease; }
        @keyframes shake {
            0%, 100% {transform: translateX(0);}
            10%, 30%, 50%, 70%, 90% {transform: translateX(-10px);}
            20%, 40%, 60%, 80% {transform: translateX(10px);}
        }

        /* Combat Mechanics Styles */
        .lives-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .heart {
            color: #ff4d4d;
            filter: drop-shadow(0 0 5px rgba(255, 77, 77, 0.5));
            transition: all 0.3s ease;
        }

        .heart.lost {
            opacity: 0.2;
            transform: scale(0.8);
            filter: grayscale(1);
        }

        #lesson-character, .boss-bug {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .char-hit { animation: char-hit-anim 0.5s ease; }
        @keyframes char-hit-anim {
            0%, 100% { transform: scale(1); filter: none; }
            25% { transform: scale(0.9) translateX(-15px); filter: brightness(2) sepia(1) hue-rotate(-50deg); }
            50% { transform: scale(1.1) translateX(10px); }
        }

        .boss-hit { animation: boss-hit-anim 0.5s ease; }
        @keyframes boss-hit-anim {
            0%, 100% { transform: scale(1); filter: none; }
            25% { transform: scale(1.2) translateY(-20px); filter: brightness(2); }
            50% { transform: scale(0.8) translateY(10px); }
        }

        .char-attack { animation: char-attack-anim 0.5s ease; }
        @keyframes char-attack-anim {
            0% { transform: translateX(0); }
            50% { transform: translateX(50px) scale(1.2); }
            100% { transform: translateX(0); }
        }

        /* Interactive Mechanic Styles */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }

        .option-card {
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-weight: 600;
        }

        .option-card:hover {
            background: rgba(255,255,255,0.08);
            border-color: var(--secondary);
            transform: translateY(-5px);
        }

        .option-card.correct {
            background: rgba(126, 217, 87, 0.1);
            border-color: var(--primary);
        }

        .option-card.wrong {
            background: rgba(255, 77, 77, 0.1);
            border-color: #ff4d4d;
        }

        .block-zone {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 25px 0;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            min-height: 60px;
        }

        .code-block-item {
            background: #222;
            border: 1px solid #444;
            padding: 10px 18px;
            border-radius: 8px;
            font-family: monospace;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
        }

        .code-block-item:hover {
            background: #333;
            border-color: var(--secondary);
        }

        .code-block-item.selected {
            background: var(--secondary);
            color: #000;
            border-color: #fff;
            transform: scale(1.05);
        }

        .code-template-view {
            font-family: monospace;
            font-size: 1.4rem;
            background: #000;
            padding: 30px;
            border-radius: 15px;
            margin: 20px 0;
            border: 1px solid #333;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .template-slot {
            min-width: 80px;
            height: 40px;
            background: rgba(255,255,255,0.05);
            border: 2px dashed #555;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 15px;
        }

        .template-slot.filled {
            border-style: solid;
            border-color: var(--primary);
            background: rgba(126, 217, 87, 0.1);
            color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="icon-btn" style="color:#fff; text-decoration:none;">
            <i data-lucide="arrow-left"></i>
        </a>
        <div class="progress-wrapper">
            <div id="main-progress-bar"></div>
        </div>
        <div id="user-stats" style="font-weight:bold; color:var(--primary); font-size: 1.2rem;">0%</div>
    </div>

    <div class="course-container">

        <!-- Map View -->
        <div id="map-view">
            <div id="character">
                <div class="char-body">
                    <div class="char-eye"></div>
                    <div class="char-eye"></div>
                </div>
                <div class="char-feet">
                    <div class="char-foot"></div>
                    <div class="char-foot"></div>
                </div>
            </div>
        </div>

        <!-- Courses Detail View (Sub-Map) -->
         <div id="stage-detail-view" class="hidden" style="position: relative;">
            <div style="position: fixed; top: 90px; left: 20px; z-index: 100;">
                <button class="btn-main outline" onclick="backToMap()">
                    <i data-lucide="chevron-left"></i> Volver al Mapa de Etapas
                </button>
            </div>
            <h1 id="current-stage-name" style="font-size: 3rem; margin: 40px 0 60px; font-weight: 900; text-transform: uppercase; letter-spacing: -1px; text-align: center;"></h1>

            <div id="sub-map-container" style="position: relative; width: 100%; min-height: 100vh;">
                <!-- Sub-map SVG and nodes will be injected here -->
            </div>
         </div>

        <!-- Lesson View -->
        <div id="lesson-view" class="hidden">
            <div style="display:flex; justify-content: space-between; align-items: flex-start; margin-bottom:40px; gap: 20px;">
                <div>
                    <h2 id="lesson-title" style="font-size: 2.5rem; margin:0; color:var(--primary); font-weight: 900;"></h2>
                    <div class="lives-container" id="lives-display">
                        <i data-lucide="heart" class="heart"></i>
                        <i data-lucide="heart" class="heart"></i>
                        <i data-lucide="heart" class="heart"></i>
                    </div>
                </div>
                <button onclick="speakContent()" class="btn-main outline" id="speak-btn">
                    <i data-lucide="volume-2"></i> Escuchar
                </button>
            </div>

            <div style="display:flex; flex-direction: column; align-items: center; margin-bottom:30px;">
                <div id="lesson-char-container" style="display:flex; gap: 60px; align-items: center; justify-content: center; margin-bottom: 30px; width: 100%;">
                    <div id="lesson-character" class="char-body">
                        <div class="char-eye"></div>
                        <div class="char-eye"></div>
                    </div>
                    <div id="boss-container" class="hidden">
                        <div class="boss-bug">
                            <div class="boss-eye left"></div>
                            <div class="boss-eye right"></div>
                        </div>
                    </div>
                </div>
                <p id="lesson-text" style="font-size: 1.3rem; line-height:1.7; color:#ccc; margin:0; text-align: center; max-width: 700px;"></p>
            </div>

            <div id="lesson-code-wrapper" class="code-block">
                <pre id="lesson-code" style="margin:0;"></pre>
            </div>

            <div class="practice-card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                    <span id="practice-status" class="practice-tag" style="padding: 6px 18px; border-radius: 30px; font-weight:900; font-size:0.75rem; color: #000; background: var(--secondary);">APRENDIENDO</span>
                </div>

                <h3 id="practice-question" style="font-size: 1.6rem; margin-bottom:35px; font-weight: 700;"></h3>

                <div id="practice-area" style="margin-bottom:20px;"></div>

                <div id="feedback-msg" class="hidden" style="margin-bottom:30px; padding: 15px 20px; border-radius: 12px; font-size: 1rem; line-height: 1.5; border-left: 4px solid;"></div>

                <div style="display:flex; gap:20px; justify-content: flex-end;">
                    <button class="btn-main" id="check-btn" onclick="checkAnswer()">
                        Comprobar <i data-lucide="check-circle"></i>
                    </button>
                    <button class="btn-main hidden" id="next-btn" onclick="nextStep()" style="background:var(--secondary);">
                        Continuar <i data-lucide="chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/course-data.js"></script>
    <script src="js/course-logic.js"></script>
    <script>
        if (typeof lucide !== 'undefined') lucide.createIcons();
    </script>
</body>
</html>
