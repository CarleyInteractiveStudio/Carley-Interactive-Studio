<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de Certificados - Carley Interactive</title>
    <link rel="stylesheet" href="estilos.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link rel="icon" type="image/png" href="carley_foto_web/Logo_C.png">
    <style>
        .verify-container {
            max-width: 600px;
            margin: 100px auto;
            padding: 40px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        @media (max-width: 600px) {
            .verify-container {
                margin: 80px 15px;
                padding: 25px;
            }
            .cert-info-grid {
                grid-template-columns: 1fr !important;
            }
            .search-box {
                flex-direction: column;
            }
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .result-card {
            margin-top: 40px;
            padding: 30px;
            background: #fff;
            color: #222;
            border-radius: 20px;
            text-align: left;
            animation: fadeIn 0.5s ease-out;
            border: 5px solid #f8f4e5;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-valid {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #27ae60;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .cert-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .info-item label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0.5;
            margin-bottom: 5px;
        }

        .info-item span {
            font-weight: bold;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="verify-container">
        <img src="carley_foto_web/Logo_C.png" width="60" style="margin-bottom: 20px;">
        <h1 style="font-weight: 900; margin-bottom: 10px;">Verificador de Autenticidad</h1>
        <p style="opacity: 0.6;">Ingresa el código serial del certificado para validar su autenticidad en nuestra base de datos.</p>

        <div class="search-box">
            <input type="text" id="serial-input" class="code-input" placeholder="Ej: CE-2026-ABCDE" style="text-align:center;">
            <button class="btn-main" onclick="verifyCertificate()">Validar</button>
        </div>

        <div id="loader" class="hidden" style="margin-top: 30px;">
            <div class="spinner"></div>
            <p>Buscando en los archivos de la academia...</p>
        </div>

        <div id="result-area"></div>
    </div>

    <script src="js/main.js"></script>
    <script>
        async function verifyCertificate() {
            const serial = document.getElementById('serial-input').value.trim().toUpperCase();
            if (!serial) return;

            const loader = document.getElementById('loader');
            const resultArea = document.getElementById('result-area');

            loader.classList.remove('hidden');
            resultArea.innerHTML = '';

            try {
                const { data, error } = await window.supabaseClient
                    .from('certificates')
                    .select('*')
                    .eq('id', serial)
                    .single();

                loader.classList.add('hidden');

                if (error || !data) {
                    resultArea.innerHTML = `
                        <div style="margin-top:40px; color:#ff4d4d; font-weight:bold;">
                            <i data-lucide="alert-triangle"></i> No se encontró ningún certificado con ese código.
                        </div>
                    `;
                } else {
                    const privacy = data.privacy_settings || {};
                    const date = new Date(data.created_at).toLocaleDateString();

                    resultArea.innerHTML = `
                        <div class="result-card">
                            <div class="status-valid">
                                <i data-lucide="check-circle-2"></i> Certificado Auténtico y Válido
                            </div>
                            <h2 style="margin: 5px 0 20px; font-family: Georgia, serif;">${data.full_name}</h2>

                            <div style="font-size:0.9rem; line-height:1.6; opacity:0.8;">
                                Este documento confirma que el usuario es un Desarrollador Certificado por Carley Interactive Studio en Creative Engine Scripting.
                            </div>

                            <div class="cert-info-grid">
                                <div class="info-item">
                                    <label>Fecha de Emisión</label>
                                    <span>${date}</span>
                                </div>
                                <div class="info-item">
                                    <label>Código Serial</label>
                                    <span style="font-family:monospace;">${data.id}</span>
                                </div>
                                ${privacy.show_score ? `
                                <div class="info-item">
                                    <label>Calificación</label>
                                    <span style="color:#a67c00;">${data.score}%</span>
                                </div>` : ''}
                                ${privacy.show_rank ? `
                                <div class="info-item">
                                    <label>Rango Obtenido</label>
                                    <span style="color:#a67c00;">Rango ${data.rank}</span>
                                </div>` : ''}
                            </div>

                            ${privacy.show_achievements && data.achievements.length > 0 ? `
                            <div style="margin-top:25px; border-top:1px solid #eee; padding-top:15px;">
                                <label style="font-size:0.7rem; text-transform:uppercase; opacity:0.5; display:block; margin-bottom:10px;">Logros Destacados</label>
                                <div style="display:flex; flex-wrap:wrap; gap:8px;">
                                    ${data.achievements.map(a => `<span style="background:#f8f4e5; padding:4px 10px; border-radius:10px; font-size:0.75rem; font-weight:bold; color:#a67c00;">${a}</span>`).join('')}
                                </div>
                            </div>` : ''}
                        </div>
                    `;
                }
                if (typeof lucide !== 'undefined') lucide.createIcons();
            } catch (err) {
                console.error(err);
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
