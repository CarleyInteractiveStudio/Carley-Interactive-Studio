<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soluciones Rápidas - Creative Engine</title>
    <meta name="description" content="Encuentra soluciones a los errores más comunes en Creative Engine.">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://carleystudio.com/soluciones-rapidas.html">
    <meta property="og:title" content="Soluciones Rápidas - Creative Engine">
    <meta property="og:description" content="Guía de resolución de problemas para desarrolladores de Creative Engine.">
    <meta property="og:image" content="https://carleystudio.com/carley_foto_web/Logo_C.png">

    <link rel="stylesheet" href="estilos.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9270161527829251" crossorigin="anonymous"></script>
    <link rel="icon" type="image/png" href="carley_foto_web/Logo_C.png">
    <style>
        .solutions-page-container {
            padding: 100px 20px 60px;
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
            min-height: calc(100vh - 200px);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .solutions-header {
            margin-bottom: 40px;
        }

        .solutions-title {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to bottom, #ffffff, #00aaff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .solutions-content {
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 3rem;
            border-radius: 30px;
            max-width: 800px;
            margin: 0 auto;
        }

        .solutions-placeholder-text {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.8;
            margin-bottom: 2rem;
        }

        .report-hint {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 1rem 2rem;
            background: rgba(0, 170, 255, 0.1);
            color: var(--accent);
            border-radius: 15px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .report-hint:hover {
            background: rgba(0, 170, 255, 0.2);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .solutions-title { font-size: 2rem; }
            .solutions-content { padding: 1.5rem; }
        }
    </style>
</head>
<body class="engine-body">

    <header class="glass-header">
        <div class="header-content">
            <div class="logo-area" onclick="window.location.href='index.html'">
                <img src="carley_foto_web/Logo_C.png" alt="C" class="logo-c">
                <div class="logo-name-wrapper">
                    <span class="logo-name">Carley Interactive Studio</span>
                </div>
            </div>

            <div class="search-area">
                <div class="search-input-wrapper">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="main-search" placeholder="Buscar en Carley..." data-i18n-ph="search-ph">
                    <div id="search-dropdown" class="search-results-dropdown hidden"></div>
                </div>
            </div>

            <div class="nav-controls">
                <select id="lang-picker" class="lang-picker">
                    <option value="es">🇪🇸 ES</option>
                    <option value="en">🇺🇸 EN</option>
                    <option value="fr">🇫🇷 FR</option>
                    <option value="pt">🇵🇹 PT</option>
                    <option value="zh">🇨🇳 ZH</option>
                    <option value="ru">🇷🇺 RU</option>
                    <option value="it">🇮🇹 IT</option>
                    <option value="ja">🇯🇵 JA</option>
                    <option value="sw">🇹🇿 SW</option>
                </select>
                <a href="cuenta.html" class="icon-btn">
                    <i data-lucide="user"></i>
                </a>
            </div>
        </div>
    </header>

    <main class="solutions-page-container">
        <div class="solutions-content product-reveal active" style="max-width: 1000px; text-align: left;">
            <header class="solutions-header" style="text-align: center;">
                <h1 class="solutions-title" data-i18n="ce-docs-solutions-title">Guía de Solución Rápida (FAQ)</h1>
                <p class="ce-text" data-i18n="ce-docs-solutions-intro" style="color: rgba(255,255,255,0.6);"></p>
            </header>

            <div class="solutions-list">
                <h2 class="ce-subtitle" data-i18n="ce-docs-solutions-scripting"></h2>
                <ul class="ce-list" style="margin-bottom: 2rem;">
                    <li data-i18n="ce-sol-1"></li>
                    <li data-i18n="ce-sol-2"></li>
                    <li data-i18n="ce-sol-3"></li>
                    <li data-i18n="ce-sol-4"></li>
                    <li data-i18n="ce-sol-5"></li>
                </ul>

                <h2 class="ce-subtitle" data-i18n="ce-docs-solutions-physics"></h2>
                <ul class="ce-list" style="margin-bottom: 2rem;">
                    <li data-i18n="ce-sol-21"></li>
                    <li data-i18n="ce-sol-23"></li>
                    <li data-i18n="ce-sol-27"></li>
                </ul>

                <h2 class="ce-subtitle" data-i18n="ce-docs-solutions-ui"></h2>
                <ul class="ce-list" style="margin-bottom: 2rem;">
                    <li data-i18n="ce-sol-31"></li>
                    <li data-i18n="ce-sol-34"></li>
                    <li data-i18n="ce-sol-36"></li>
                </ul>

                <h2 class="ce-subtitle" data-i18n="ce-docs-solutions-audio"></h2>
                <ul class="ce-list" style="margin-bottom: 2rem;">
                    <li data-i18n="ce-sol-41"></li>
                    <li data-i18n="ce-sol-42"></li>
                    <li data-i18n="ce-sol-46"></li>
                </ul>

                <h2 class="ce-subtitle" data-i18n="ce-docs-solutions-editor"></h2>
                <ul class="ce-list" style="margin-bottom: 2rem;">
                    <li data-i18n="ce-sol-51"></li>
                    <li data-i18n="ce-sol-55"></li>
                </ul>
            </div>

            <div style="text-align: center; margin-top: 2rem;">
                <a href="creative-engine.html#report" class="report-hint">
                    <i data-lucide="bug"></i>
                    <span data-i18n="ce-nav-report">Reportar otro fallo</span>
                </a>
            </div>

            <!-- Ad Unit -->
            <div style="margin: 3rem 0 1rem; text-align: center;">
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-9270161527829251"
                     data-ad-slot="6345892107"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
            </div>
        </div>
    </main>

    <footer class="studio-footer">
        <div class="footer-legal">
            <p data-i18n="footer-copyright">&copy; 2026 Carley Interactive Studio. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();

            // Initialize AdSense
            try {
                (adsbygoogle = window.adsbygoogle || []).push({});
            } catch (e) {}
        });
    </script>
</body>
</html>
